<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; color: #1a1d23; font-size: 16.5px; }
  :root {
    --red: #e53e3e; --red-light: #fff5f5; --red-border: #feb2b2;
    --yellow: #d69e2e; --yellow-light: #fffff0; --yellow-border: #faf089;
    --green: #38a169; --green-light: #f0fff4; --green-border: #9ae6b4;
    --orange: #dd6b20; --orange-light: #fffaf0; --orange-border: #fbd38d;
    --blue: #3182ce; --blue-light: #ebf8ff; --blue-border: #bee3f8;
    --purple: #6b46c1;
    --bg: #f0f2f5; --card: #ffffff;
    --text: #1a1d23; --text-muted: #718096;
    --border: #e2e8f0;
  }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .tab-btn { cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; transition: all 0.2s; }
  .tab-btn:focus { outline: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
  .kpi-card { background: var(--card); border-radius: 12px; padding: 20px 16px; border: 1px solid var(--border); text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .metric-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .metric-table th { background: #f7fafc; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 2px solid var(--border); text-align: left; cursor: pointer; white-space: nowrap; }
  .metric-table th:hover { background: #edf2f7; }
  .metric-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .metric-table tr:last-child td { border-bottom: none; }
  .metric-table tr:hover td { background: #f7fafc; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .pill-red { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }
  .pill-yellow { background: var(--yellow-light); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .pill-green { background: var(--green-light); color: var(--green); border: 1px solid var(--green-border); }
  .pill-orange { background: var(--orange-light); color: var(--orange); border: 1px solid var(--orange-border); }
  .heatmap-cell { padding: 8px 10px; font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace; text-align: center; border-radius: 6px; white-space: nowrap; }
  .cell-red { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
  .cell-yellow { background: #fffff0; color: #b7791f; border: 1px solid #f6e05e; }
  .cell-green { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
  .cell-orange { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-radius: 10px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .chevron { transition: transform 0.2s; }
  details[open] .chevron { transform: rotate(180deg); }
  .insight-card { background: var(--card); border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
  .insight-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 13.5px; line-height: 1.5; }
  .header-bar { background: linear-gradient(135deg, #1a1d23 0%, #2d3748 100%); color: white; padding: 24px 28px; border-radius: 14px; margin-bottom: 24px; }
</style>
</head>

  { member: "Hasala Jayasuriya",        activityPercent: 57, totalHours: 175.8, breakHours: 15.6, breakPercent: 8.9,  manualHours: 0.9, manualPercent: 0.5, low20Hours: 0.9,  low20Percent: 0.5,  low30Hours: 2.1,  low30Percent: 1.2,  redFlags: 0, yellowFlags: 0, totalFlags: 0 },
  { member: "Kunchana Prabashwara",     activityPercent: 69, totalHours: 187.3, breakHours: 15.8, breakPercent: 8.5,  manualHours: 0.0, manualPercent: 0.0, low20Hours: 0.0,  low20Percent: 0.0,  low30Hours: 0.0,  low30Percent: 0.0,  redFlags: 0, yellowFlags: 0, totalFlags: 0 },
  { member: "Laleesha Wijeratne",       activityPercent: 55, totalHours: 169.2, breakHours: 13.7, breakPercent: 8.1,  manualHours: 0.6, manualPercent: 0.4, low20Hours: 1.6,  low20Percent: 0.9,  low30Hours: 8.1,  low30Percent: 4.8,  redFlags: 0, yellowFlags: 0, totalFlags: 0 },

  { member: "Nishantha Hettiarachchi",  activityPercent: 34, totalHours: 99.4,  breakHours: 6.7,  breakPercent: 6.7,  manualHours: 0.0, manualPercent: 0.0, low20Hours: 0.0,  low20Percent: 0.0,  low30Hours: 29.7, low30Percent: 29.9, redFlags: 3, yellowFlags: 0, totalFlags: 3 },
  { member: "Ramez Sedra",              activityPercent: 54, totalHours: 177.0, breakHours: 11.4, breakPercent: 6.4,  manualHours: 0.3, manualPercent: 0.2, low20Hours: 2.6,  low20Percent: 1.5,  low30Hours: 6.0,  low30Percent: 3.4,  redFlags: 0, yellowFlags: 0, totalFlags: 0 },
  { member: "Shehara Meadows",          activityPercent: 42, totalHours: 155.9, breakHours: 13.1, breakPercent: 8.4,  manualHours: 0.0, manualPercent: 0.0, low20Hours: 9.6,  low20Percent: 6.1,  low30Hours: 24.0, low30Percent: 15.4, redFlags: 0, yellowFlags: 2, totalFlags: 2 },
  { member: "Thushan Fernando",         activityPercent: 52, totalHours: 178.5, breakHours: 11.9, breakPercent: 6.7,  manualHours: 0.0, manualPercent: 0.0, low20Hours: 11.1, low20Percent: 6.2,  low30Hours: 24.6, low30Percent: 13.8, redFlags: 0, yellowFlags: 1, totalFlags: 1 },

// Team sub-categories for Tab 3: Team Analytics
// Format: { "Sub-Team Name": ["Member 1", "Member 2"], ... }
const TEAM_CATEGORIES = {"Site Content Team": ["Kunchana Prabashwara", "Ramez Sedra", "Shehara Meadows"], "Catalog Team": ["Laleesha Wijeratne", "Jomal Mathew"], "BI & Data Team": ["Bihani Madushika", "Modhuka Paranagama"], "Platform & Engineering": ["Hasala Jayasuriya", "Thushan Fernando", "Nishantha Hettiarachchi"], "CRM Team": ["Adam Burdeshaw", "Chathuranga Weerakoon", "Dr. Yashoda Velananda", "Muhammad Usman"], "DP - Leads": ["Adam Burdeshaw", "Bihani Madushika", "Dr. Yashoda Velananda", "Laleesha Wijeratne", "Shehara Meadows"]};
// ============================================================================
// END DATA BLOCK
// ============================================================================

// ============================================================================
// SLA THRESHOLDS — locked, do not change
// ============================================================================
const SLA = {
  activity:    { red: 35, yellow: 45 },
  hours:       { red: 130, yellow: 150, orange: 200 },
  breakPct:    { red: 12, yellow: 10 },
  manualPct:   { red: 10, yellow: 5 },
  low20Pct:    { red: 15, yellow: 7.5 },
  low30Pct:    { red: 20, yellow: 10 },
};

const checkStatus = (metric, value) => {
  const t = SLA[metric];
  if (!t) return 'green';
  if (metric === 'activity' || metric === 'hours') {
    if (value < t.red) return 'red';
    if (value < t.yellow) return 'yellow';
    if (t.orange && value >= t.orange) return 'orange';
    return 'green';
  }
  if (value >= t.red) return 'red';
  if (value >= t.yellow) return 'yellow';
  return 'green';
};

// ============================================================================
// HELPERS
// ============================================================================
const StatusPill = ({ status, label }) => {
  const cls = { red: 'pill pill-red', yellow: 'pill pill-yellow', green: 'pill pill-green', orange: 'pill pill-orange' };
  return <span className={cls[status] || 'pill pill-green'}>{label}</span>;
};

const HeatCell = ({ metric, value, fmt, label }) => {
  const s = checkStatus(metric, value);
  const cls = { red: 'heatmap-cell cell-red', yellow: 'heatmap-cell cell-yellow', green: 'heatmap-cell cell-green', orange: 'heatmap-cell cell-orange' };
  return <div className={cls[s] || 'heatmap-cell cell-green'}>{label !== undefined ? label : (fmt ? fmt(value) : value)}</div>;
};

// Compute flags from SLA thresholds — orange (hours ≥200) counts as red/orange
const computeFlags = (m) => {
  const statuses = [
    checkStatus('activity', m.activityPercent),
    checkStatus('hours',    m.totalHours),
    checkStatus('breakPct', m.breakPercent),
    checkStatus('manualPct',m.manualPercent),
    checkStatus('low20Pct', m.low20Percent),
    checkStatus('low30Pct', m.low30Percent),
  ];
  const red    = statuses.filter(s => s === 'red' || s === 'orange').length;
  const yellow = statuses.filter(s => s === 'yellow').length;
  return { redFlags: red, yellowFlags: yellow, totalFlags: red + yellow };
};

// ============================================================================
// MAIN COMPONENT
// ============================================================================
const Dashboard = () => {
  // Recompute flags from SLA thresholds — overrides CSV-provided values for accuracy
  data.forEach(m => { const f = computeFlags(m); m.redFlags = f.redFlags; m.yellowFlags = f.yellowFlags; m.totalFlags = f.totalFlags; });

  const [tab, setTab] = useState(1);
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [selectedTeam, setSelectedTeam] = useState(() => Object.keys(TEAM_CATEGORIES)[0]);
  const [teamSortKey, setTeamSortKey] = useState(null);
  const [teamSortDir, setTeamSortDir] = useState('asc');
  const [activeLegend, setActiveLegend] = useState(null);

  // Full-dataset stats for header
  const n = data.length;
  const avgActivity      = n > 0 ? data.reduce((s, m) => s + m.activityPercent, 0) / n : 0;
  const avgHours         = n > 0 ? data.reduce((s, m) => s + m.totalHours, 0) / n : 0;
  const avgBreakPct      = n > 0 ? data.reduce((s, m) => s + m.breakPercent, 0) / n : 0;
  const totalRedFlags    = data.reduce((s, m) => s + m.redFlags, 0);
  const totalYellowFlags = data.reduce((s, m) => s + m.yellowFlags, 0);
  const totalFlags       = data.reduce((s, m) => s + m.totalFlags, 0);
  const membersWithFlags = data.filter(m => m.totalFlags > 0).length;
  const noViolations     = data.filter(m => m.totalFlags === 0).length;
  const avg = key => n > 0 ? data.reduce((s, m) => s + m[key], 0) / n : 0;

  const sortedData = useMemo(() => {
    if (!sortKey) return data;
    return [...data].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'number') return sortDir === 'asc' ? av - bv : bv - av;
      return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  }, [sortKey, sortDir]);

  const teamSortedMembers = (members) => {
    if (!teamSortKey) return [...members].sort((a,b) => b.activityPercent - a.activityPercent);
    return [...members].sort((a, b) => {
      const av = a[teamSortKey], bv = b[teamSortKey];
      if (typeof av === 'number') return teamSortDir === 'asc' ? av - bv : bv - av;
      return teamSortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  };

  const sort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };

  const teamSort = (key) => {
    if (teamSortKey === key) setTeamSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setTeamSortKey(key); setTeamSortDir('asc'); }
  };

  const SortIcon = ({ k }) => {
    if (sortKey !== k) return <span style={{color:'#cbd5e0',marginLeft:4}}>↕</span>;
    return <span style={{color:'#3182ce',marginLeft:4}}>{sortDir === 'asc' ? '↑' : '↓'}</span>;
  };

  const TeamSortIcon = ({ k }) => {
    if (teamSortKey !== k) return <span style={{color:'#cbd5e0',marginLeft:4}}>↕</span>;
    return <span style={{color:'#38a169',marginLeft:4}}>{teamSortDir === 'asc' ? '↑' : '↓'}</span>;
  };

  const tabStyle = (t, color) => ({
    padding: '10px 20px', borderRadius: 8, border: 'none',
    background: tab === t ? color : '#edf2f7',
    color: tab === t ? 'white' : '#4a5568',
    fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: 13.5,
    cursor: 'pointer', transition: 'all 0.2s',
    boxShadow: tab === t ? '0 4px 12px rgba(0,0,0,0.15)' : 'none',
    transform: tab === t ? 'translateY(-1px)' : 'none',
  });

  const legendBtnStyle = (key) => ({
    padding: '10px 16px', borderRadius: 8, border: activeLegend === key ? 'none' : '1px solid #e2e8f0',
    background: activeLegend === key ? 'linear-gradient(135deg,#3182ce,#4299e1)' : 'white',
    color: activeLegend === key ? 'white' : '#4a5568',
    fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: 13,
    cursor: 'pointer', transition: 'all 0.2s',
    boxShadow: activeLegend === key ? '0 4px 12px rgba(49,130,206,0.35)' : 'none',
    textAlign: 'left',
  });

  const toggleLegend = (key) => setActiveLegend(prev => prev === key ? null : key);

  // Pie chart data for Section 3
  const redOnly    = data.filter(m => m.redFlags > 0 && m.yellowFlags === 0).length;
  const yellowOnly = data.filter(m => m.redFlags === 0 && m.yellowFlags > 0).length;
  const both       = data.filter(m => m.redFlags > 0 && m.yellowFlags > 0).length;
  const noViol     = data.filter(m => m.totalFlags === 0).length;

  const pieData = [
    { name: 'Red Only',      value: redOnly,    color: '#fc8181' },
    { name: 'Yellow Only',   value: yellowOnly, color: '#f6e05e' },

  // Legend content definitions
  const legendContent = {

    hours: {

      yellow: { label: 'Yellow Warning', desc: '130–150 hours', threshold: '130–150h' },
      how: 'Total hours tracked during the month. For full-time team members, expected range is 160–190 hours per month.',
    },
    break: {

      red:    { label: 'Red Violation (Critical)', desc: '≥ 12% of total hours', threshold: '≥ 12%' },
      yellow: { label: 'Yellow Warning', desc: '10–12% of total hours', threshold: '10–12%' },

      yellow: { label: 'Yellow Warning', desc: '≥ 10% of total hours', threshold: '≥ 10%' },
      how: "Broader metric capturing time when activity falls below 30%. Displayed as 'X.X hrs (X.X%)'. Captures ≤20% PLUS additional low activity between 20–30%.",
    },
  };

  return (
    <div style={{maxWidth:1400, margin:'0 auto', padding:'20px 16px'}}>

      {/* ── HEADER ── */}
      <div className="header-bar">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'#a0aec0',textTransform:'uppercase',marginBottom:4}}>

              <div style={{fontSize:22,fontWeight:700}}>{avgHours.toFixed(0)}</div>
              <div style={{fontSize:11,color:'#a0aec0',marginTop:2}}>Avg Hours</div>
            </div>
          </div>
        </div>
      </div>

      {/* ── TAB ROW ── */}
      <div style={{display:'flex',gap:8,marginBottom:20,background:'white',padding:10,borderRadius:10,border:'1px solid #e2e8f0',flexWrap:'wrap'}}>

                          const actColor  = m.activityPercent < 35 ? '#c53030' : m.activityPercent < 45 ? '#b7791f' : '#276749';
                          const actWeight = m.activityPercent < 45 ? 700 : 400;
                          const hrsColor  = m.totalHours < 80 ? '#c53030' : m.totalHours < 140 ? '#b7791f' : '#276749';
                          const hrsWeight = m.totalHours < 140 ? 700 : 400;
                          const brkColor  = m.breakPercent >= 12 ? '#c53030' : m.breakPercent >= 10 ? '#b7791f' : '#276749';
                          const brkWeight = m.breakPercent >= 10 ? 700 : 400;
                          const l20Color  = m.low20Percent >= 15 ? '#c53030' : m.low20Percent >= 7.5 ? '#b7791f' : '#276749';
                          const l20Weight = m.low20Percent >= 7.5 ? 700 : 400;
                          const l30Color  = m.low30Percent >= 20 ? '#c53030' : m.low30Percent >= 10 ? '#b7791f' : '#276749';
                          const l30Weight = m.low30Percent >= 10 ? 700 : 400;
                          const rowBg     = m.totalFlags > 0 ? '#fff5f5' : 'transparent';
                          return (
                            <tr key={i} style={{background:rowBg}}>
                              <td style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap'}}>{m.member}</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:actColor,fontWeight:actWeight}}>{m.activityPercent.toFixed(1)}%</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:hrsColor,fontWeight:hrsWeight}}>{m.totalHours.toFixed(1)}</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:brkColor,fontWeight:brkWeight}}>{m.breakPercent.toFixed(1)}%</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:l20Color,fontWeight:l20Weight}}>{m.low20Percent.toFixed(1)}%</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:l30Color,fontWeight:l30Weight}}>{m.low30Percent.toFixed(1)}%</td>
                              <td>
                                {m.totalFlags === 0
                                  ? <span className="pill pill-green">✅ Clean</span>
                                  : <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                                      {m.redFlags>0    && <span className="pill pill-red">🔴{m.redFlags}</span>}
                                      {m.yellowFlags>0 && <span className="pill pill-yellow">⚠️{m.yellowFlags}</span>}
                                    </div>
                                }
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 3. Activity Performance Analysis */}
                <div style={cardStyle}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4,color:'#1a1d23'}}>🔵 Activity Performance Analysis</div>
                  <div style={{fontSize:12,color:'#718096',marginBottom:12}}>
                    Avg: <strong style={{fontFamily:'DM Mono,monospace'}}>{tAvgActivity.toFixed(1)}%</strong> &nbsp;|&nbsp; Range: <strong style={{fontFamily:'DM Mono,monospace'}}>{tLowActivity.activityPercent.toFixed(1)}% – {tHighActivity.activityPercent.toFixed(1)}%</strong>
                  </div>
                  <div>
                    <div style={bulletStyle}>
                      <span style={{color:'#276749',fontWeight:700,flexShrink:0}}>•</span>
                      <span>★ <strong>{tHighActivity.member}</strong> leads with <strong>{tHighActivity.activityPercent.toFixed(1)}%</strong> activity — highest in the team this month.</span>
                    </div>
                    <div style={bulletStyle}>
                      <span style={{color: tLowActivity.activityPercent < 35 ? '#e53e3e' : tLowActivity.activityPercent < 45 ? '#d69e2e' : '#276749', fontWeight:700, flexShrink:0}}>•</span>
                      <span>
                        <strong>{tLowActivity.member}</strong> has the lowest activity at <strong>{tLowActivity.activityPercent.toFixed(1)}%</strong> —{' '}
                        {tLowActivity.activityPercent < 35
                          ? <span style={{color:'#e53e3e',fontWeight:600}}>Red flag: below the critical 35% threshold, immediate review needed.</span>
                          : tLowActivity.activityPercent < 45
                          ? <span style={{color:'#d69e2e',fontWeight:600}}>Yellow warning: in the 35–45% zone, close monitoring recommended.</span>
                          : <span style={{color:'#276749'}}>within acceptable range.</span>
                        }
                      </span>
                    </div>
                    <div style={bulletStyle}>
                      <span style={{color: activityRange > 30 ? '#e53e3e' : activityRange > 20 ? '#d69e2e' : '#276749', fontWeight:700, flexShrink:0}}>•</span>
                      <span>
                        Activity range is <strong>{activityRange.toFixed(1)} percentage points</strong> —{' '}
                        {activityRange > 30
                          ? <span style={{color:'#e53e3e',fontWeight:600}}>large gap indicating significant performance disparity within the team.</span>
                          : activityRange > 20
                          ? <span style={{color:'#d69e2e',fontWeight:600}}>moderate variation across team members; some inconsistency noted.</span>
                          : <span style={{color:'#276749'}}>relatively consistent performance across the team.</span>
                        }
                      </span>
                    </div>
                  </div>
                </div>

                {/* 4. Hours & Availability Trends */}
                <div style={cardStyle}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4,color:'#1a1d23'}}>🟢 Hours & Availability Trends</div>
                  <div style={{fontSize:12,color:'#718096',marginBottom:12}}>
                    Avg: <strong style={{fontFamily:'DM Mono,monospace'}}>{tAvgHours.toFixed(1)} hrs</strong> &nbsp;|&nbsp; Range: <strong style={{fontFamily:'DM Mono,monospace'}}>{tLeastHours.totalHours.toFixed(1)} – {tMostHours.totalHours.toFixed(1)} hrs</strong>
                  </div>
                  <div>
                    <div style={bulletStyle}>
                      <span style={{color:'#276749',fontWeight:700,flexShrink:0}}>•</span>
                      <span><strong>{tMostHours.member}</strong> logged the most hours at <strong>{tMostHours.totalHours.toFixed(1)} hrs</strong>{tMostHours.totalHours >= 200 ? ' — above the 200h orange threshold, workload review recommended' : tMostHours.totalHours >= 160 ? ' — within the target range' : ''}.</span>
                    </div>
                    <div style={bulletStyle}>
                      <span style={{color: tLeastHours.totalHours < 130 ? '#e53e3e' : tLeastHours.totalHours < 150 ? '#d69e2e' : '#276749', fontWeight:700, flexShrink:0}}>•</span>
                      <span>
                        <strong>{tLeastHours.member}</strong> logged the fewest hours at <strong>{tLeastHours.totalHours.toFixed(1)} hrs</strong> ({Math.abs(tAvgHours - tLeastHours.totalHours).toFixed(1)} hrs below team avg){' '}
                        {tLeastHours.totalHours < 130
                          ? <span style={{color:'#e53e3e',fontWeight:600}}>— red/orange flag: significantly below expected hours.</span>
                          : tLeastHours.totalHours < 150
                          ? <span style={{color:'#d69e2e',fontWeight:600}}>— yellow warning: below target range.</span>
                          : <span style={{color:'#276749'}}>— within acceptable range.</span>
                        }
                      </span>
                    </div>
                    <div style={bulletStyle}>
                      <span style={{color: hoursRange > 100 ? '#e53e3e' : hoursRange > 50 ? '#d69e2e' : '#276749', fontWeight:700, flexShrink:0}}>•</span>
                      <span>
                        Hours range across team: <strong>{hoursRange.toFixed(1)} hrs</strong> —{' '}
                        {hoursRange > 100
                          ? <span style={{color:'#e53e3e',fontWeight:600}}>very large variance; investigate scheduling or availability issues.</span>
                          : hoursRange > 50
                          ? <span style={{color:'#d69e2e',fontWeight:600}}>noticeable spread; some members may need support.</span>
                          : <span style={{color:'#276749'}}>team is broadly consistent in hours logged.</span>
                        }
                      </span>
                    </div>
                  </div>
                </div>

                {/* 5. Break Time Patterns */}
                <div style={cardStyle}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4,color:'#1a1d23'}}>🟡 Break Time Patterns</div>
                  <div style={{fontSize:12,color:'#718096',marginBottom:12}}>
                    Avg: <strong style={{fontFamily:'DM Mono,monospace'}}>{tAvgBreak.toFixed(1)}%</strong> &nbsp;|&nbsp; Range: <strong style={{fontFamily:'DM Mono,monospace'}}>{tMinBreak.breakPercent.toFixed(1)}% – {tMaxBreak.breakPercent.toFixed(1)}%</strong>
                  </div>
                  <div>
                    <div style={bulletStyle}>
                      <span style={{color: tAvgBreak >= 12 ? '#e53e3e' : tAvgBreak >= 10 ? '#d69e2e' : '#276749', fontWeight:700, flexShrink:0}}>•</span>
                      <span>
                        Team average break time is <strong>{tAvgBreak.toFixed(1)}%</strong> —{' '}
                        {tAvgBreak >= 12
                          ? <span style={{color:'#e53e3e',fontWeight:600}}>red/orange flag: exceeds the 12% critical threshold.</span>
                          : tAvgBreak >= 10
                          ? <span style={{color:'#d69e2e',fontWeight:600}}>yellow warning: above the 10% target.</span>
                          : <span style={{color:'#276749'}}>within the target (&lt;10%).</span>
                        }
                      </span>
                    </div>
                    {tMaxBreak.breakPercent >= 12 && (
                      <div style={bulletStyle}>
                        <span style={{color:'#e53e3e',fontWeight:700,flexShrink:0}}>•</span>
                        <span><strong>{tMaxBreak.member}</strong> has the highest break rate at <strong>{tMaxBreak.breakPercent.toFixed(1)}%</strong> — <span style={{color:'#e53e3e',fontWeight:600}}>exceeds the red threshold; review recommended.</span></span>
                      </div>
                    )}
                    <div style={bulletStyle}>
                      <span style={{color:'#718096',fontWeight:700,flexShrink:0}}>•</span>
                      <span>Break time varies from <strong>{tMinBreak.breakPercent.toFixed(1)}%</strong> ({tMinBreak.member}) to <strong>{tMaxBreak.breakPercent.toFixed(1)}%</strong> ({tMaxBreak.member}) across the team.</span>
                    </div>
                  </div>
                </div>

                {/* 6. Low Activity Periods (≤30%) */}
                <div style={cardStyle}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4,color:'#1a1d23'}}>🟠 Low Activity Periods (≤30%)</div>
                  <div style={{fontSize:12,color:'#718096',marginBottom:12}}>
                    Avg: <strong style={{fontFamily:'DM Mono,monospace'}}>{tAvgLow30.toFixed(1)}%</strong> &nbsp;|&nbsp; Range: <strong style={{fontFamily:'DM Mono,monospace'}}>{tMinLow30.low30Percent.toFixed(1)}% – {tMaxLow30.low30Percent.toFixed(1)}%</strong>
                  </div>
                  <div>
                    <div style={bulletStyle}>
                      <span style={{color: tAvgLow30 >= 20 ? '#e53e3e' : tAvgLow30 >= 10 ? '#d69e2e' : '#276749', fontWeight:700, flexShrink:0}}>•</span>
                      <span>
                        Team average low activity (≤30%) is <strong>{tAvgLow30.toFixed(1)}%</strong> —{' '}
                        {tAvgLow30 >= 20
                          ? <span style={{color:'#e53e3e',fontWeight:600}}>red/orange flag: exceeds the 20% critical threshold.</span>
                          : tAvgLow30 >= 10
                          ? <span style={{color:'#d69e2e',fontWeight:600}}>yellow warning: above the 10% target.</span>
                          : <span style={{color:'#276749'}}>within acceptable range.</span>
                        }
                      </span>
                    </div>
                    {tMaxLow30.low30Percent >= 20 && (
                      <div style={bulletStyle}>
                        <span style={{color:'#e53e3e',fontWeight:700,flexShrink:0}}>•</span>
                        <span><strong>{tMaxLow30.member}</strong> has <strong>{tMaxLow30.low30Percent.toFixed(1)}%</strong> low activity — <span style={{color:'#e53e3e',fontWeight:600}}>above the 20% red threshold; review engagement patterns.</span></span>
                      </div>
                    )}
                    <div style={bulletStyle}>
                      <span style={{color:'#718096',fontWeight:700,flexShrink:0}}>•</span>
                      <span>Low activity ranges from <strong>{tMinLow30.low30Percent.toFixed(1)}%</strong> ({tMinLow30.member}) to <strong>{tMaxLow30.low30Percent.toFixed(1)}%</strong> ({tMaxLow30.member}).</span>
                    </div>
                  </div>
                </div>

                {/* 7. SLA Compliance Overview */}
                <div style={cardStyle}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:8,color:'#1a1d23'}}>🔴 SLA Compliance Overview</div>
                  <p style={{fontSize:13.5,color:'#4a5568',marginBottom:10,lineHeight:1.6}}>
                    {tWithFlags === 0
                      ? `All ${tm} member${tm !== 1 ? 's' : ''} in ${selectedTeam} are fully SLA-compliant this month — excellent performance.`
                      : `${tWithFlags} of ${tm} member${tm !== 1 ? 's' : ''} in ${selectedTeam} have SLA violations requiring attention.`
                    }
                  </p>
                  <div>
                    {tTotalRed > 0 && (
                      <div style={bulletStyle}>
                        <span style={{color:'#e53e3e',fontWeight:700,flexShrink:0}}>•</span>
                        <span><strong style={{color:'#e53e3e'}}>{tTotalRed} red/orange flag{tTotalRed !== 1 ? 's' : ''}</strong> across {teamMembers.filter(m=>m.redFlags>0).length} member{teamMembers.filter(m=>m.redFlags>0).length !== 1 ? 's' : ''} ({teamMembers.filter(m=>m.redFlags>0).map(m=>m.member).join(', ')}) — immediate attention required.</span>
                      </div>
                    )}
                    {tTotalYellow > 0 && (
                      <div style={bulletStyle}>
                        <span style={{color:'#d69e2e',fontWeight:700,flexShrink:0}}>•</span>
                        <span><strong style={{color:'#d69e2e'}}>{tTotalYellow} yellow flag{tTotalYellow !== 1 ? 's' : ''}</strong> across {teamMembers.filter(m=>m.yellowFlags>0).length} member{teamMembers.filter(m=>m.yellowFlags>0).length !== 1 ? 's' : ''} ({teamMembers.filter(m=>m.yellowFlags>0).map(m=>m.member).join(', ')}) — monitor closely.</span>
                      </div>
                    )}
                    <div style={bulletStyle}>
                      <span style={{color:'#276749',fontWeight:700,flexShrink:0}}>•</span>
                      <span><strong style={{color:'#276749'}}>{tCompliant} member{tCompliant !== 1 ? 's' : ''}</strong> {tCompliant !== 1 ? 'are' : 'is'} fully clean — zero SLA violations{tCompliant > 0 ? `: ${teamMembers.filter(m=>m.totalFlags===0).map(m=>m.member).join(', ')}` : ''}.</span>
                    </div>
                    {tWithFlags > tm / 2 && (
                      <div style={{marginTop:8,background:'#fff5f5',border:'1px solid #feb2b2',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#c53030',fontWeight:600}}>
                        ⚠️ Systemic Issues Warning: Over half the team ({tWithFlags} of {tm} members) have violations. A team-wide review and intervention is recommended.
                      </div>
                    )}
                  </div>
                </div>
              </>
            );
          })()}
        </div>
      )}

      {/* Footer */}
      <div style={{marginTop:24,textAlign:'center',fontSize:11,color:'#a0aec0',padding:'12px 0'}}>
        Generated for WebLife · {DEPT} · {MONTH} {YEAR} · SLA thresholds per WebLife SLA Violation Legend v1.0
      </div>
    </div>
  );
};

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
</html>
