<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{DEPT}} – {{MONTH}} {{YEAR}} Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; color: #1a1d23; }
  :root {
    --red: #e53e3e; --red-light: #fff5f5; --red-border: #feb2b2;
    --yellow: #d69e2e; --yellow-light: #fffff0; --yellow-border: #faf089;
    --green: #38a169; --green-light: #f0fff4; --green-border: #9ae6b4;
    --orange: #dd6b20; --orange-light: #fffaf0; --orange-border: #fbd38d;
    --blue: #3182ce; --blue-light: #ebf8ff; --blue-border: #bee3f8;
    --purple: #6b46c1;
    --bg: #f0f2f5; --card: #ffffff;
    --text: #1a1d23; --text-muted: #718096;
    --border: #e2e8f0;
  }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .tab-btn { cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; transition: all 0.2s; }
  .tab-btn:focus { outline: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
  .kpi-card { background: var(--card); border-radius: 12px; padding: 20px 16px; border: 1px solid var(--border); text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .metric-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .metric-table th { background: #f7fafc; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 2px solid var(--border); text-align: left; cursor: pointer; white-space: nowrap; }
  .metric-table th:hover { background: #edf2f7; }
  .metric-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .metric-table tr:last-child td { border-bottom: none; }
  .metric-table tr:hover td { background: #f7fafc; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .pill-red { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }
  .pill-yellow { background: var(--yellow-light); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .pill-green { background: var(--green-light); color: var(--green); border: 1px solid var(--green-border); }
  .pill-orange { background: var(--orange-light); color: var(--orange); border: 1px solid var(--orange-border); }
  .heatmap-cell { padding: 8px 10px; font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace; text-align: center; border-radius: 6px; white-space: nowrap; }
  .cell-red { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
  .cell-yellow { background: #fffff0; color: #b7791f; border: 1px solid #f6e05e; }
  .cell-green { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
  .cell-orange { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-radius: 10px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .chevron { transition: transform 0.2s; }
  details[open] .chevron { transform: rotate(180deg); }
  .insight-card { background: var(--card); border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
  .insight-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 13.5px; line-height: 1.5; }
  .header-bar { background: linear-gradient(135deg, #1a1d23 0%, #2d3748 100%); color: white; padding: 24px 28px; border-radius: 14px; margin-bottom: 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { PieChart, Pie, Cell, Tooltip, Legend, ResponsiveContainer } = Recharts;

// ============================================================================
// DATA — {{DEPT}}, {{MONTH}} {{YEAR}}
// !! THIS BLOCK IS AUTO-POPULATED BY CLAUDE EACH MONTH — DO NOT EDIT MANUALLY !!
// ============================================================================
const MONTH = "{{MONTH}}";
const YEAR  = "{{YEAR}}";
const DEPT  = "{{DEPT}}";

const data = [
  // {{DATA_ROWS}}
  // Note: each row may include a subTeam field for filter functionality
];
// ============================================================================
// END DATA BLOCK
// ============================================================================

// ============================================================================
// SLA THRESHOLDS — locked, do not change
// ============================================================================
const SLA = {
  activity:    { red: 35, yellow: 45 },
  hours:       { red: 130, yellow: 150, orange: 200 },
  breakPct:    { red: 12, yellow: 10 },
  manualPct:   { red: 10, yellow: 5 },
  low20Pct:    { red: 15, yellow: 7.5 },
  low30Pct:    { red: 20, yellow: 10 },
};

const checkStatus = (metric, value) => {
  const t = SLA[metric];
  if (!t) return 'green';
  if (metric === 'activity' || metric === 'hours') {
    if (value < t.red) return 'red';
    if (value < t.yellow) return 'yellow';
    if (t.orange && value >= t.orange) return 'orange';
    return 'green';
  }
  if (value >= t.red) return 'red';
  if (value >= t.yellow) return 'yellow';
  return 'green';
};

// ============================================================================
// HELPERS
// ============================================================================
const StatusPill = ({ status, label }) => {
  const cls = { red: 'pill pill-red', yellow: 'pill pill-yellow', green: 'pill pill-green', orange: 'pill pill-orange' };
  return <span className={cls[status] || 'pill pill-green'}>{label}</span>;
};

const HeatCell = ({ metric, value, fmt, label }) => {
  const s = checkStatus(metric, value);
  const cls = { red: 'heatmap-cell cell-red', yellow: 'heatmap-cell cell-yellow', green: 'heatmap-cell cell-green', orange: 'heatmap-cell cell-orange' };
  return <div className={cls[s] || 'heatmap-cell cell-green'}>{label !== undefined ? label : (fmt ? fmt(value) : value)}</div>;
};

// Compute flags from SLA thresholds — only metrics visible in the heatmap table
// manualPct is excluded (not shown as a column) so counts match visible colored cells
// orange (hours ≥200) counts as red/orange
const computeFlags = (m) => {
  const statuses = [
    checkStatus('activity', m.activityPercent),
    checkStatus('hours',    m.totalHours),
    checkStatus('breakPct', m.breakPercent),
    checkStatus('low20Pct', m.low20Percent),
    checkStatus('low30Pct', m.low30Percent),
  ];
  const red    = statuses.filter(s => s === 'red' || s === 'orange').length;
  const yellow = statuses.filter(s => s === 'yellow').length;
  return { redFlags: red, yellowFlags: yellow, totalFlags: red + yellow };
};

// ============================================================================
// MAIN COMPONENT
// ============================================================================
const Dashboard = () => {
  // Recompute flags from SLA thresholds — overrides CSV-provided values for accuracy
  data.forEach(m => { const f = computeFlags(m); m.redFlags = f.redFlags; m.yellowFlags = f.yellowFlags; m.totalFlags = f.totalFlags; });

  const [tab, setTab] = useState(1);
  const [subTeamFilter, setSubTeamFilter] = useState('All');
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [activeLegend, setActiveLegend] = useState(null);

  // Derive unique sub-teams from data
  const subTeams = useMemo(() => {
    const unique = [...new Set(data.map(m => m.subTeam).filter(Boolean))];
    if (unique.length === 0) return null;
    return ['All', ...unique];
  }, []);

  // Filtered data reactive to subTeamFilter
  const filteredData = useMemo(() => {
    if (subTeamFilter === 'All' || !subTeams) return data;
    return data.filter(m => m.subTeam === subTeamFilter);
  }, [subTeamFilter, subTeams]);

  // Computed stats from filteredData
  const fn = filteredData.length;
  const favg = key => fn === 0 ? 0 : filteredData.reduce((s, m) => s + m[key], 0) / fn;
  const fAvgActivity      = favg('activityPercent');
  const fAvgHours         = favg('totalHours');
  const fAvgBreakPct      = favg('breakPercent');
  const fTotalRedFlags    = filteredData.reduce((s, m) => s + m.redFlags, 0);
  const fTotalYellowFlags = filteredData.reduce((s, m) => s + m.yellowFlags, 0);
  const fTotalFlags       = filteredData.reduce((s, m) => s + m.totalFlags, 0);
  const fMembersWithFlags = filteredData.filter(m => m.totalFlags > 0).length;
  const fNoViolations     = filteredData.filter(m => m.totalFlags === 0).length;
  const fBothFlags        = filteredData.filter(m => m.redFlags > 0 && m.yellowFlags > 0).length;
  const fRedMembers       = filteredData.filter(m => m.redFlags > 0).length;
  const fOver160          = filteredData.filter(m => m.totalHours > 160);

  // Header always shows full-data stats
  const nAll           = data.length;
  const avgActivityAll = data.reduce((s, m) => s + m.activityPercent, 0) / Math.max(nAll, 1);
  const avgHoursAll    = data.reduce((s, m) => s + m.totalHours, 0) / Math.max(nAll, 1);
  const withFlagsAll   = data.filter(m => m.totalFlags > 0).length;

  const sortedData = useMemo(() => {
    if (!sortKey) return filteredData;
    return [...filteredData].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'number') return sortDir === 'asc' ? av - bv : bv - av;
      return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  }, [filteredData, sortKey, sortDir]);

  const sort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };

  const SortIcon = ({ k }) => {
    if (sortKey !== k) return <span style={{color:'#cbd5e0',marginLeft:4}}>↕</span>;
    return <span style={{color:'#3182ce',marginLeft:4}}>{sortDir === 'asc' ? '↑' : '↓'}</span>;
  };

  const tabStyle = (t, color) => ({
    padding: '10px 20px', borderRadius: 8, border: 'none',
    background: tab === t ? color : '#edf2f7',
    color: tab === t ? 'white' : '#4a5568',
    fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: 13.5,
    cursor: 'pointer', transition: 'all 0.2s',
    boxShadow: tab === t ? '0 4px 12px rgba(0,0,0,0.15)' : 'none',
    transform: tab === t ? 'translateY(-1px)' : 'none',
  });

  const filterBtnStyle = (st) => ({
    padding: '6px 14px', borderRadius: 6, border: 'none',
    background: subTeamFilter === st ? '#4a5568' : '#edf2f7',
    color: subTeamFilter === st ? 'white' : '#4a5568',
    fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: 12,
    cursor: 'pointer', transition: 'all 0.2s',
    boxShadow: subTeamFilter === st ? '0 2px 8px rgba(0,0,0,0.12)' : 'none',
    transform: subTeamFilter === st ? 'translateY(-1px)' : 'none',
    whiteSpace: 'nowrap',
  });

  const legendBtnStyle = (key) => ({
    padding: '10px 16px', borderRadius: 8, border: activeLegend === key ? 'none' : '1px solid #e2e8f0',
    background: activeLegend === key ? 'linear-gradient(135deg,#3182ce,#4299e1)' : 'white',
    color: activeLegend === key ? 'white' : '#4a5568',
    fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: 13,
    cursor: 'pointer', transition: 'all 0.2s',
    boxShadow: activeLegend === key ? '0 4px 12px rgba(49,130,206,0.35)' : 'none',
    textAlign: 'left',
  });

  const toggleLegend = (key) => setActiveLegend(prev => prev === key ? null : key);

  // Pie chart data for Section 3
  const redOnly    = filteredData.filter(m => m.redFlags > 0 && m.yellowFlags === 0).length;
  const yellowOnly = filteredData.filter(m => m.redFlags === 0 && m.yellowFlags > 0).length;
  const both       = filteredData.filter(m => m.redFlags > 0 && m.yellowFlags > 0).length;
  const noViol     = filteredData.filter(m => m.totalFlags === 0).length;

  const pieData = [
    { name: 'Red Only',       value: redOnly,    color: '#fc8181' },
    { name: 'Yellow Only',    value: yellowOnly,  color: '#f6e05e' },
    { name: 'Both',           value: both,        color: '#fb923c' },
    { name: 'No Violations',  value: noViol,      color: '#68d391' },
  ].filter(d => d.value > 0);

  // Legend content definitions
  const legendContent = {
    activity: {
      title: 'Activity Level',
      red:    { label: 'Red Violation (Critical)', desc: '< 35% activity', threshold: '< 35%' },
      yellow: { label: 'Yellow Warning', desc: '35–45% activity', threshold: '35–45%' },
      how: 'Activity percentage measures keyboard and mouse engagement during tracked time. Calculated by Hubstaff, represents overall productivity engagement during work sessions.',
    },
    hours: {
      title: 'Total Worked Hours',
      red:    { label: 'Red Violation (Critical)', desc: '< 130 hours', threshold: '< 130h' },
      yellow: { label: 'Yellow Warning', desc: '130–150 hours', threshold: '130–150h' },
      how: 'Total hours tracked during the month. For full-time team members, expected range is 160–190 hours per month.',
    },
    break: {
      title: 'Break Time',
      red:    { label: 'Red Violation (Critical)', desc: '≥ 12% of total hours', threshold: '≥ 12%' },
      yellow: { label: 'Yellow Warning', desc: '10–12% of total hours', threshold: '10–12%' },
      how: "Break Time tracks periods when team members are on official breaks. Displayed as 'X.X hrs (X.X%)' showing both actual hours and percentage of total logged time. Target: keep below 10%.",
    },
    low20: {
      title: 'Low Activity ≤20%',
      red:    { label: 'Red Violation (Critical)', desc: '≥ 15% of total hours', threshold: '≥ 15%' },
      yellow: { label: 'Yellow Warning', desc: '7.5–15% of total hours', threshold: '7.5–15%' },
      how: "Captures periods of minimal computer interaction (≤20% activity). Displayed as 'X.X hrs (X.X%)'. Represents times when employee is idle or working away from computer.",
    },
    low30: {
      title: 'Low Activity ≤30%',
      red:    { label: 'Red Violation (Critical)', desc: '≥ 20% of total hours', threshold: '≥ 20%' },
      yellow: { label: 'Yellow Warning', desc: '≥ 10% of total hours', threshold: '≥ 10%' },
      how: "Broader metric capturing time when activity falls below 30%. Displayed as 'X.X hrs (X.X%)'. Captures ≤20% PLUS additional low activity between 20–30%.",
    },
  };

  return (
    <div style={{maxWidth:1200, margin:'0 auto', padding:'20px 16px'}}>

      {/* ── HEADER — always full-data stats ── */}
      <div className="header-bar">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'#a0aec0',textTransform:'uppercase',marginBottom:4}}>
              WebLife · Monthly Performance Report
            </div>
            <h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>{DEPT} Department</h1>
            <div style={{fontSize:15,color:'#a0aec0',fontWeight:400}}>{MONTH} {YEAR} · {nAll} team members</div>
          </div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <div style={{textAlign:'center',background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 18px'}}>
              <div style={{fontSize:22,fontWeight:700}}>{avgActivityAll.toFixed(0)}%</div>
              <div style={{fontSize:11,color:'#a0aec0',marginTop:2}}>Avg Activity</div>
            </div>
            <div style={{textAlign:'center',background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 18px'}}>
              <div style={{fontSize:22,fontWeight:700}}>{avgHoursAll.toFixed(0)}</div>
              <div style={{fontSize:11,color:'#a0aec0',marginTop:2}}>Avg Hours</div>
            </div>
          </div>
        </div>
      </div>

      {/* ── SUB-TEAM FILTER BAR ── */}
      {subTeams && (
        <div style={{
          background:'white', borderRadius:10, padding:'10px 14px',
          border:'1px solid #e2e8f0', marginBottom:12,
          display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'
        }}>
          <span style={{fontSize:11,fontWeight:600,color:'#718096',textTransform:'uppercase',letterSpacing:'0.06em',marginRight:4}}>
            Filter by Sub-Team:
          </span>
          {subTeams.map(st => (
            <button key={st} className="tab-btn" style={filterBtnStyle(st)} onClick={() => setSubTeamFilter(st)}>
              {st}{st !== 'All' ? ` (${data.filter(m => m.subTeam === st).length})` : ` (${data.length})`}
            </button>
          ))}
        </div>
      )}

      {/* ── TABS ── */}
      <div style={{display:'flex',gap:8,marginBottom:20,background:'white',padding:10,borderRadius:10,border:'1px solid #e2e8f0',flexWrap:'wrap'}}>
        <button className="tab-btn" style={tabStyle(1,'#3182ce')} onClick={() => setTab(1)}>📊 SLA Overview</button>
        <button className="tab-btn" style={tabStyle(2,'#6b46c1')} onClick={() => setTab(2)}>🌡️ SLA Heatmap</button>
      </div>

      {/* ════════════════════════════════════════════════════════════
          TAB 1 — SLA OVERVIEW
          ════════════════════════════════════════════════════════════ */}
      {tab === 1 && (
        <div className="fade-in">

          {/* ── Section 1: Team Overview Summary ── */}
          <details open style={{marginBottom:12}}>
            <summary className="section-header" style={{background:'linear-gradient(135deg,#ebf8ff,#e6fffa)'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:36,height:36,borderRadius:8,background:'#3182ce',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:16}}>📋</div>
                <span style={{fontWeight:700,fontSize:16,color:'#2c5282'}}>1. Team Overview Summary</span>
              </div>
              <svg className="chevron" width="20" height="20" fill="none" stroke="#718096" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </summary>
            <div style={{padding:'16px 0 4px'}}>

              {/* 6 KPI tiles */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:20}}>
                {[
                  { label:'Total Members',      value: fn,                                color:'#3182ce',                                                                     sub:'' },
                  { label:'Average Activity %', value: fAvgActivity.toFixed(1)+'%',       color: fAvgActivity<35?'#e53e3e':fAvgActivity<45?'#d69e2e':'#38a169',               sub:'Target ≥45%' },
                  { label:'Avg Hours Logged',   value: fAvgHours.toFixed(1),              color: fAvgHours<130?'#e53e3e':fAvgHours<150?'#d69e2e':'#38a169',                    sub:'Target 160–190' },
                  { label:'Total Red/Orange Flags', value: fTotalRedFlags,               color: fTotalRedFlags>0?'#e53e3e':'#38a169',                                         sub:'Critical' },
                  { label:'Total Yellow Flags', value: fTotalYellowFlags,                 color: fTotalYellowFlags>0?'#d69e2e':'#38a169',                                      sub:'Monitor' },
                  { label:'Total Flags',        value: fTotalFlags,                       color: fTotalFlags>0?'#718096':'#38a169',                                            sub:'All violations' },
                ].map((k, i) => (
                  <div key={i} className="kpi-card">
                    <div style={{fontSize:11,color:'#718096',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:6}}>{k.label}</div>
                    <div style={{fontSize:28,fontWeight:700,color:k.color,lineHeight:1}}>{k.value}</div>
                    {k.sub && <div style={{fontSize:11,color:'#a0aec0',marginTop:5}}>{k.sub}</div>}
                  </div>
                ))}
              </div>

              {/* Performance Highlights paragraph */}
              <div style={{background:'#ebf8ff',border:'1px solid #bee3f8',borderRadius:10,padding:'16px 18px',marginBottom:0,lineHeight:1.7,fontSize:13.5,color:'#2c5282'}}>
                <strong>Performance Summary{subTeamFilter !== 'All' ? ` — ${subTeamFilter}` : ''}:</strong>{' '}
                The {DEPT}{subTeamFilter !== 'All' ? ` — ${subTeamFilter} sub-team` : ' team'} maintained an average activity level of {fAvgActivity.toFixed(1)}% across {fn} team member{fn !== 1 ? 's' : ''} in {MONTH} {YEAR}. The team logged an average of {fAvgHours.toFixed(1)} hours per person, with {fOver160.length} member{fOver160.length !== 1 ? 's' : ''} exceeding 160 hours for the month.{' '}
                Performance highlights include {fNoViolations} member{fNoViolations !== 1 ? 's' : ''} meeting all SLA requirements with zero flags, while {fRedMembers} member{fRedMembers !== 1 ? 's' : ''} had red/orange flags requiring attention. {fBothFlags} member{fBothFlags !== 1 ? 's' : ''} have both red/orange and yellow flags.
              </div>
            </div>
          </details>

          {/* ── Section 2: Notable Achievements ── */}
          <details style={{marginBottom:12}}>
            <summary className="section-header" style={{background:'linear-gradient(135deg,#f0fff4,#e6fffa)'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:36,height:36,borderRadius:8,background:'#38a169',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:16}}>🌟</div>
                <span style={{fontWeight:700,fontSize:16,color:'#276749'}}>2. Notable Achievements</span>
              </div>
              <svg className="chevron" width="20" height="20" fill="none" stroke="#718096" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </summary>
            <div style={{padding:'16px 0 4px'}}>

              {/* Two side-by-side cards */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>

                {/* Highest Activity Levels */}
                <div className="insight-card" style={{background:'linear-gradient(135deg,#ebf8ff,#e6fffa)',border:'1px solid #bee3f8'}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'#2c5282'}}>🏆 Highest Activity Levels</div>
                  {filteredData.length === 0
                    ? <div style={{fontSize:13,color:'#718096',fontStyle:'italic'}}>No data for this filter.</div>
                    : [...filteredData].sort((a,b) => b.activityPercent - a.activityPercent).slice(0,3).map((m, i) => (
                      <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:i<2?'1px solid rgba(49,130,206,0.15)':'none',flexWrap:'wrap',gap:6}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{width:28,height:28,borderRadius:6,background:'#3182ce',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,flexShrink:0}}>{i+1}</div>
                          <div>
                            <div style={{fontWeight:600,fontSize:13}}>{m.member}</div>
                            <div style={{fontSize:12,color:'#4a5568'}}>{m.activityPercent}% activity</div>
                          </div>
                        </div>
                        <span style={{fontSize:11,fontWeight:600,color:'#3182ce',background:'rgba(49,130,206,0.1)',padding:'2px 8px',borderRadius:9999}}>
                          {m.subTeam || DEPT}
                        </span>
                      </div>
                    ))
                  }
                </div>

                {/* Most Hours Logged */}
                <div className="insight-card" style={{background:'linear-gradient(135deg,#faf5ff,#e9d8fd30)',border:'1px solid #e9d8fd'}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'#553c9a'}}>⏱️ Most Hours Logged</div>
                  {filteredData.length === 0
                    ? <div style={{fontSize:13,color:'#718096',fontStyle:'italic'}}>No data for this filter.</div>
                    : [...filteredData].sort((a,b) => b.totalHours - a.totalHours).slice(0,3).map((m, i) => (
                      <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:i<2?'1px solid rgba(107,70,193,0.15)':'none',flexWrap:'wrap',gap:6}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{width:28,height:28,borderRadius:6,background:['#6b46c1','#805ad5','#9f7aea'][i],color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,flexShrink:0}}>{i+1}</div>
                          <div>
                            <div style={{fontWeight:600,fontSize:13}}>{m.member}</div>
                            <div style={{fontSize:12,color:'#4a5568'}}>{m.totalHours.toFixed(1)} hours</div>
                          </div>
                        </div>
                        <span style={{fontSize:11,fontWeight:600,color:'#6b46c1',background:'rgba(107,70,193,0.1)',padding:'2px 8px',borderRadius:9999}}>
                          {m.subTeam || DEPT}
                        </span>
                      </div>
                    ))
                  }
                </div>
              </div>

              {/* Zero-Flag Champions — full width */}
              <div className="insight-card" style={{background:'linear-gradient(135deg,#f0fff4,#e6fffa)',border:'1px solid #9ae6b4'}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'#276749'}}>✅ Zero-Flag Champions</div>
                {filteredData.filter(m => m.totalFlags === 0).length === 0
                  ? <div style={{fontSize:13,color:'#718096',fontStyle:'italic'}}>No members with zero violations in this filter.</div>
                  : (
                    <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
                      {filteredData.filter(m => m.totalFlags === 0).map((m, i) => (
                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,background:'white',border:'1px solid #9ae6b4',borderRadius:8,padding:'8px 12px'}}>
                          <div style={{width:30,height:30,borderRadius:'50%',background:'#38a169',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,flexShrink:0}}>
                            {m.member.split(' ').map(w => w[0]).slice(0,2).join('')}
                          </div>
                          <div>
                            <div style={{fontWeight:600,fontSize:12}}>{m.member}</div>
                            <div style={{display:'flex',gap:4,marginTop:2}}>
                              <span style={{fontSize:10,fontWeight:600,background:'#ebf8ff',color:'#3182ce',border:'1px solid #bee3f8',padding:'1px 6px',borderRadius:9999}}>{m.activityPercent}%</span>
                              <span style={{fontSize:10,fontWeight:600,background:'#faf5ff',color:'#6b46c1',border:'1px solid #e9d8fd',padding:'1px 6px',borderRadius:9999}}>{m.totalHours.toFixed(1)} hrs</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )
                }
              </div>
            </div>
          </details>


        </div>
      )}

      {/* ════════════════════════════════════════════════════════════
          TAB 2 — SLA HEATMAP
          ════════════════════════════════════════════════════════════ */}
      {tab === 2 && (
        <div className="fade-in">

          {/* ── Part 1: SLA Violation Legend ── */}
          <div style={{background:'white',borderRadius:12,padding:20,border:'1px solid #e2e8f0',marginBottom:16}}>
            <h2 style={{fontWeight:700,fontSize:16,marginBottom:10,color:'#1a1d23'}}>SLA Violation Legend</h2>

            {/* Info box */}
            <div style={{background:'linear-gradient(135deg,#ebf8ff,#e6fffa)',border:'1px solid #bee3f8',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#2c5282',lineHeight:1.6}}>
              <strong>How SLA Metrics Are Monitored:</strong> Click on each category below to see thresholds and violation criteria
            </div>

            {/* 5 toggle buttons */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:8,marginBottom:16}}>
              {[
                { key:'activity', label:'Activity Level (A)' },
                { key:'hours',    label:'Total Hours (H)' },
                { key:'break',    label:'Break Time (B)' },
                { key:'low20',    label:'Low Activity ≤20%' },
                { key:'low30',    label:'Low Activity ≤30%' },
              ].map(btn => (
                <button key={btn.key} style={legendBtnStyle(btn.key)} onClick={() => toggleLegend(btn.key)}>
                  {btn.label}
                </button>
              ))}
            </div>

            {/* Expandable detail panel */}
            {activeLegend && legendContent[activeLegend] && (() => {
              const lc = legendContent[activeLegend];
              return (
                <div style={{background:'#f7fafc',borderRadius:10,border:'1px solid #e2e8f0',padding:16}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'#1a1d23'}}>{lc.title} — Thresholds</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                    <div style={{background:'#fff5f5',border:'1px solid #feb2b2',borderLeft:'4px solid #e53e3e',borderRadius:8,padding:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:'#e53e3e',flexShrink:0}}></div>
                        <span style={{fontWeight:700,fontSize:12,color:'#c53030'}}>{lc.red.label}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:600,color:'#c53030',marginBottom:2}}>{lc.red.threshold}</div>
                      <div style={{fontSize:12,color:'#4a5568'}}>{lc.red.desc}</div>
                    </div>
                    <div style={{background:'#fffff0',border:'1px solid #f6e05e',borderLeft:'4px solid #d69e2e',borderRadius:8,padding:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:'#d69e2e',flexShrink:0}}></div>
                        <span style={{fontWeight:700,fontSize:12,color:'#b7791f'}}>{lc.yellow.label}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:600,color:'#b7791f',marginBottom:2}}>{lc.yellow.threshold}</div>
                      <div style={{fontSize:12,color:'#4a5568'}}>{lc.yellow.desc}</div>
                    </div>
                  </div>
                  <div style={{background:'#ebf8ff',border:'1px solid #bee3f8',borderRadius:8,padding:'10px 14px',fontSize:12.5,color:'#2c5282',lineHeight:1.6}}>
                    <strong>How it's measured:</strong> {lc.how}
                  </div>
                </div>
              );
            })()}
          </div>

          {/* ── Part 2: Heatmap Table ── */}
          <div style={{background:'white',borderRadius:12,padding:20,border:'1px solid #e2e8f0',overflowX:'auto'}}>
            <h2 style={{fontWeight:700,fontSize:18,marginBottom:4,color:'#1a1d23'}}>
              Interactive SLA Heatmap — {MONTH} {YEAR}{subTeamFilter !== 'All' ? ` — ${subTeamFilter}` : ''}
            </h2>
            <p style={{fontSize:13,color:'#718096',marginBottom:16}}>Click column headers to sort. Colors reflect SLA thresholds.</p>

            {/* Color legend pills */}
            <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
              {[
                ['🔴 Red Critical',    '#fff5f5','#e53e3e','#feb2b2'],
                ['⚠️ Yellow Warning',  '#fffff0','#d69e2e','#f6e05e'],
                ['✅ Green Within target','#f0fff4','#38a169','#9ae6b4'],
                ['🟠 Orange Overwork flag','#fffaf0','#dd6b20','#fbd38d'],
              ].map(([label, bg, clr, brd], i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:6,background:bg,border:`1px solid ${brd}`,fontSize:12,color:clr,fontWeight:600}}>
                  {label}
                </div>
              ))}
            </div>

            <table className="metric-table">
              <thead>
                <tr>
                  {[
                    {key:'member',        label:'Member'},
                    {key:'activityPercent',label:'Activity %'},
                    {key:'totalHours',    label:'Total Hours'},
                    {key:'breakPercent',  label:'Break Time'},
                    {key:'low20Percent',  label:'Low Activity ≤20%'},
                    {key:'low30Percent',  label:'Low Activity ≤30%'},
                    {key:'totalFlags',    label:'SLA Flags'},
                  ].map(col => (
                    <th key={col.key} onClick={() => sort(col.key)}>{col.label}<SortIcon k={col.key}/></th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sortedData.map((m, i) => (
                  <tr key={i}>
                    <td style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap'}}>{m.member}</td>
                    <td><HeatCell metric="activity"  value={m.activityPercent} fmt={v => v+'%'}/></td>
                    <td><HeatCell metric="hours"     value={m.totalHours}      fmt={v => v.toFixed(1)+' hrs'}/></td>
                    <td><HeatCell metric="breakPct"  value={m.breakPercent}    label={`${(m.breakHours||0).toFixed(1)} (${m.breakPercent.toFixed(1)}%)`}/></td>
                    <td><HeatCell metric="low20Pct"  value={m.low20Percent}    label={`${(m.low20Hours||0).toFixed(1)} (${m.low20Percent.toFixed(1)}%)`}/></td>
                    <td><HeatCell metric="low30Pct"  value={m.low30Percent}    label={`${(m.low30Hours||0).toFixed(1)} (${m.low30Percent.toFixed(1)}%)`}/></td>
                    <td>
                      {m.totalFlags === 0
                        ? <span className="pill pill-green">✅ Clean</span>
                        : <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                            {m.redFlags > 0    && <span className="pill pill-red">🔴 {m.redFlags}</span>}
                            {m.yellowFlags > 0 && <span className="pill pill-yellow">⚠️ {m.yellowFlags}</span>}
                          </div>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {/* Team Averages row */}
            <div style={{marginTop:16,padding:'12px 16px',background:'#f7fafc',borderRadius:8,border:'1px solid #e2e8f0'}}>
              <div style={{fontWeight:700,fontSize:12,color:'#718096',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>
                Team Averages{subTeamFilter !== 'All' ? ` — ${subTeamFilter}` : ''}
              </div>
              <div style={{display:'flex',gap:16,flexWrap:'wrap',fontSize:13}}>
                {[
                  {label:'Activity', val:fAvgActivity.toFixed(1)+'%',          status:checkStatus('activity', fAvgActivity)},
                  {label:'Hours',    val:fAvgHours.toFixed(1)+' hrs',           status:checkStatus('hours',    fAvgHours)},
                  {label:'Break%',   val:fAvgBreakPct.toFixed(1)+'%',           status:checkStatus('breakPct', fAvgBreakPct)},
                  {label:'Low20%',   val:favg('low20Percent').toFixed(1)+'%',   status:checkStatus('low20Pct', favg('low20Percent'))},
                  {label:'Low30%',   val:favg('low30Percent').toFixed(1)+'%',   status:checkStatus('low30Pct', favg('low30Percent'))},
                ].map((a, i) => (
                  <div key={i} style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{color:'#718096'}}>{a.label}:</span>
                    <span className={`pill pill-${a.status}`} style={{fontFamily:'DM Mono,monospace'}}>{a.val}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

        </div>
      )}

      {/* ── FOOTER ── */}
      <div style={{marginTop:24,textAlign:'center',fontSize:11,color:'#a0aec0',padding:'12px 0'}}>
        Generated for WebLife · {DEPT} · {MONTH} {YEAR} · SLA thresholds per WebLife SLA Violation Legend v1.0
      </div>
    </div>
  );
};

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
</html>
